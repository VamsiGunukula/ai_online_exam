<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - AI Online Exam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #020617;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
            position: relative;
        }

        .welcome-card {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 60px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 15px;
            margin-bottom: 30px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .college-name {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 20px;
            color: #94a3b8;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .project-info {
            margin-bottom: 40px;
        }

        .project-guide {
            font-size: 18px;
            color: #cbd5e1;
            margin-bottom: 25px;
        }

        .team-members {
            text-align: left;
            margin-bottom: 40px;
        }

        .team-members h3 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #e2e8f0;
        }

        .team-members ol {
            list-style: none;
            padding-left: 0;
        }

        .team-members li {
            padding: 8px 0;
            color: #94a3b8;
            font-size: 16px;
        }

        .team-members li::before {
            content: counter(list-item) ". ";
            color: #3b82f6;
            font-weight: 600;
            margin-right: 8px;
        }

        .enter-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        .enter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.4);
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
        }

        .enter-btn:active {
            transform: translateY(0);
        }

        .top-logo {
            position: absolute;
            top: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .top-logo img {
            width: 110px;
            height: 110px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="top-logo">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="College Logo">
    </div>
    <div class="welcome-card">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="College Logo" class="logo" onerror="this.style.display='none'">
        
        <h1 class="college-name">KRISHNA UNIVERSITY</h1>
        <p class="subtitle">Online Examination System</p>
        
                
        <div class="team-members">
            <h3>Team Members</h3>
            <ol>
                <li>K. Venkata Surya Teja</li>
                <li>D. Kusuma Surya Kiran</li>
                <li>G. Naga Vamsi</li>
                <li>K. Karthik</li>
            </ol>
        </div>
        
        <a href="/login" class="enter-btn">Enter</a>
    </div>
</body>
</html>
